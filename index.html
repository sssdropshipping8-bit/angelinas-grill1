<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angelina’s Brewery and Grill | Sports Tavern in Mechanicsburg, PA</title>

    <meta name="description" content="Visit Angelina’s Brewery and Grill at 398 N York St, Mechanicsburg. Cold beer, good friends, great food, and the best local neighborhood tavern vibe.">
    <meta name="keywords" content="Angelina's Brewery, sports tavern Mechanicsburg, local pub Mechanicsburg PA, draft beer, burgers, wings, neighborhood bar">

    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- BRAND STYLE GUIDE & DESIGN TOKENS --- */
        :root {
            --bg-dark: #12161a;        /* Charcoal Black background */
            --bg-card: #1c2127;        /* Dark Slate for structural containers */
            --accent-gold: #ffb703;    /* Warm Amber/Beer Gold primary */
            --accent-hover: #fb8500;   /* Deep Amber for interactive hover transitions */
            --text-light: #ffffff;     /* Crisp white for high-contrast reading */
            --text-muted: #94a3b8;     /* Soft gray for readable secondary body copy */
            --font-display: 'Big Shoulders Display', sans-serif;
            --font-body: 'Inter', sans-serif;
            --container-padding: 5% 8%;
        }

        /* --- GLOBAL CSS RESET & FONTS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 {
            font-family: var(--font-display);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* --- COMPONENT STYLES: BUTTONS --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.85rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--accent-gold);
            color: #000000;
            border: 2px solid var(--accent-gold);
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(251, 133, 0, 0.2);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-light);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            transform: translateY(-2px);
        }

        /* --- COMPONENT STYLES: NAVIGATION --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 8%;
            background-color: rgba(18, 22, 26, 0.95);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 900;
            color: var(--text-light);
        }

        .logo span {
            color: var(--accent-gold);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav a {
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: var(--accent-gold);
        }

        /* --- SECTION 1: HERO --- */
        .hero {
            padding: var(--container-padding);
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            background: linear-gradient(rgba(18, 22, 26, 0.85), rgba(18, 22, 26, 0.95)), 
                        url('https://unsplash.com') no-repeat center center/cover;
            border-bottom: 4px solid var(--accent-gold);
        }

        .hero h1 {
            font-size: 4.5rem;
            line-height: 0.95;
            margin-bottom: 1rem;
            color: var(--text-light);
        }

        .hero h1 span {
            display: block;
            color: var(--accent-gold);
        }

        .hero p {
            font-size: 1.25rem;
            max-width: 600px;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        .hero-ctas {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            width: 100%;
        }

        /* --- SECTION 2: THE VIBE --- */
        .vibe {
            padding: var(--container-padding);
            background-color: var(--bg-dark);
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
            align-items: center;
        }

        .vibe-content h2 {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .vibe-content h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background-color: var(--accent-gold);
            margin-top: 0.5rem;
        }

        .vibe-content p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .vibe-image {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .vibe-image img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 4px;
            filter: grayscale(20%) contrast(110%);
        }

        /* --- SECTION 3: HIGHLIGHTS MENU --- */
        .menu-highlights {
            padding: var(--container-padding);
            background-color: #171d24; 
        }

        .menu-highlights h2 {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 3rem;
        }

        .menu-highlights h2 span {
            color: var(--accent-gold);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 8px;
            padding: 2.5rem 2rem;
            border-top: 4px solid var(--accent-gold);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.4);
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .card h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: var(--text-light);
        }

        .card p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* --- SECTION 4: VISIT US --- */
        footer {
            padding: var(--container-padding);
            background-color: var(--bg-dark);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
        }

        .footer-info h3 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: var(--accent-gold);
        }

        .footer-info p {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .footer-info p strong {
            color: var(--text-light);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            width: 110px;
            display: inline-block;
        }

        .footer-info p span {
            color: var(--text-muted);
        }

        .footer-map {
            width: 100%;
            height: 250px;
            background-color: var(--bg-card);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .footer-map iframe {
            width: 100%;
            height: 100%;
            border: 0;
            filter: grayscale(100%) invert(92%) contrast(83%); 
        }

        .copyright {
            grid-column: 1 / -1;
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.85rem;
